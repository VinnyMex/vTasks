<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vTasks</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="theme-light">
  <div class="vtasks-root">

    <header class="vtasks-header">
      <div class="vtasks-header-main">
        <span class="vtasks-logo">vTasks</span>
        <div class="header-actions">
          <button type="button" id="open-floating-btn" class="btn-ghost" title="Janela Fixa">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5v6l1 1 1-1v-6h5v-2l-2-2z"/></svg>
          </button>
          <button type="button" id="new-note-btn" class="btn-icon" title="Nova nota">+</button>
        </div>
      </div>
    </header>

    <main class="vtasks-main">
      <section id="list-view" class="view active">
        <div id="empty-state" class="empty-state">
          <p>Nenhuma nota ainda.</p>
        </div>
        <div id="notes-grid" class="notes-grid"></div>
      </section>

      <section id="detail-view" class="view">
        <div class="detail-header">
          <button type="button" id="back-to-list-btn" class="btn-ghost">← Voltar</button>
          <button type="button" id="delete-note-btn" class="btn-danger">Excluir</button>
        </div>
        <div class="detail-body">
          <input id="note-title-input" class="note-title-input" type="text" placeholder="Título" />
          <textarea id="note-description-input" class="note-description-input" placeholder="Descrição..." rows="2"></textarea>

          <div class="detail-section">
            <div class="detail-section-header">Checklist</div>
            <ul id="checklist" class="checklist"></ul>
            <form id="checklist-form" class="checklist-form">
              <input type="text" id="checklist-input" placeholder="Item..." autocomplete="off" />
              <button type="submit" class="btn-icon sm">+</button>
            </form>
          </div>

          <div class="detail-section">
            <div class="detail-section-header">Notas rápidas</div>
            <div id="project-notes-list" class="project-notes-list"></div>
            <form id="project-note-form" class="project-note-form">
              <textarea id="project-note-input" placeholder="Anotar..." rows="2"></textarea>
              <button type="submit" class="btn-primary">OK</button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer class="vtasks-footer">
      <div class="footer-credits">vWeb Marketing</div>
      <div class="footer-actions">
        <button type="button" id="theme-toggle-btn" class="btn-footer" title="Alternar tema">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button type="button" id="open-sidepanel-btn" class="btn-footer" title="Painel lateral">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
        </button>
        <button type="button" id="export-btn" class="btn-footer" title="Exportar backup">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
      </div>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
